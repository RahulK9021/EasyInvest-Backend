spring.application.name=EasyInvest

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/easyinvest}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:9021}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8090
app.jwt.secret=${JWT_SECRET:mysecretkeymysecretkeymysecretkeymysecretkey}
app.upload.dir=${UPLOAD_DIR:uploads}
